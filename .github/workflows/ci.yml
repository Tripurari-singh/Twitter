name: CI — Lint & Type Check

# Trigger: runs on every push to any branch
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    # ubuntu-latest = GitHub provides a fresh Ubuntu VM for free

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          # cache = don't re-download packages if unchanged

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          # dummy URL just for generation, no real DB needed

      # Step 5 — Type check
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Step 6 — Lint
      - name: ESLint
        run: npm run lint || true
        # || true = don't fail if lint has warnings
